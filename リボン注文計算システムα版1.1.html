<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手帳リボン注文計算ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            background-color: #f1f5f9; 
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card { border-radius: 1.25rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .input-focus:focus { ring: 3px solid #6366f1; border-color: #6366f1; }
        
        /* トグルスイッチのカスタマイズ */
        .toggle-dot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input:checked ~ .toggle-bg { background-color: #4f46e5; }
        input:checked ~ .toggle-dot { transform: translateX(1.5rem); }

        /* タップ時のアニメーション */
        .btn-active:active { transform: scale(0.96); }
        
        /* 数字のフォント調整 */
        .font-numeric { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-3 md:p-6 lg:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div class="flex items-center">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-200 mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-gray-900 tracking-tight">リボン計算システム</h1>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Ribbon Calculation v1.2</p>
                </div>
            </div>
            <button onclick="copyToClipboard()" class="btn-active w-full md:w-auto bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-3 px-6 rounded-xl shadow-sm transition-all flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                結果をコピー
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white card p-6 md:p-8">
                    <h2 class="text-sm font-black text-gray-400 uppercase mb-6 flex items-center">
                        <span class="w-1.5 h-4 bg-indigo-500 rounded-full mr-2"></span>
                        サイズ・部数入力
                    </h2>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700 ml-1">天地 (高さ) mm</label>
                            <input type="number" id="h" value="182" class="w-full text-xl font-bold p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none input-focus transition-all">
                        </div>
                        <div id="widthContainer" class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700 ml-1">左右 (幅) mm</label>
                            <input type="number" id="w" value="128" class="w-full text-xl font-bold p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none input-focus transition-all">
                        </div>
                    </div>

                    <div class="space-y-2 mb-6">
                        <label class="block text-sm font-bold text-gray-700 ml-1">製本数 (部)</label>
                        <input type="number" id="qty" value="1000" class="w-full text-3xl font-black p-4 bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-2xl outline-none input-focus transition-all">
                    </div>

                    <!-- モード切替スイッチ -->
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-6">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-gray-400 uppercase">計算モード</span>
                            <span id="fixedLabel" class="text-base font-black text-gray-700">通常 (65mm)</span>
                        </div>
                        <label class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="checkbox" id="fixedToggle" class="sr-only" onchange="calculate()">
                                <div class="toggle-bg block bg-gray-300 w-12 h-7 rounded-full transition-colors"></div>
                                <div class="toggle-dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full shadow-md transition-transform"></div>
                            </div>
                        </label>
                    </div>

                    <div class="space-y-4 pt-6 border-t border-gray-100">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700 ml-1">使用リボン No.</label>
                            <select id="ribbonNo" class="w-full text-lg font-bold p-4 bg-white border-2 border-gray-200 rounded-2xl outline-none input-focus appearance-none cursor-pointer">
                                <!-- JSで生成 -->
                            </select>
                        </div>
                        <div id="statusAlert" class="p-4 bg-red-50 rounded-2xl border border-red-100 flex items-center hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 15.c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span class="text-xs font-black text-red-600">このリボンは「色落ち注意」の指定があります</span>
                        </div>
                        <div id="customRollArea" class="space-y-2 hidden">
                            <label class="block text-sm font-bold text-orange-600 ml-1">別注巻長 (m)</label>
                            <input type="number" id="customRollLen" value="2250" class="w-full text-xl font-bold p-4 bg-orange-50 border border-orange-200 rounded-2xl outline-none input-focus">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white card overflow-hidden border border-white">
                    <div class="p-6 md:p-8 bg-indigo-600">
                        <h2 class="text-xs font-bold text-indigo-200 uppercase tracking-widest mb-4">計算結果サマリー</h2>
                        <div class="space-y-6">
                            <div>
                                <p class="text-indigo-100 text-sm mb-1 opacity-80">1冊あたりのリボン長</p>
                                <div class="flex items-baseline text-white">
                                    <span id="singleResult" class="text-4xl font-black font-numeric">0</span>
                                    <span class="ml-2 text-xl font-bold opacity-70">mm</span>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-indigo-500/50">
                                <p class="text-indigo-100 text-sm mb-1 opacity-80">総必要長 (理論値)</p>
                                <div class="flex items-baseline text-white">
                                    <span id="totalMeters" class="text-4xl font-black font-numeric">0</span>
                                    <span class="ml-2 text-xl font-bold opacity-70">m</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-6 md:p-8 bg-orange-500">
                        <div class="flex items-center justify-between mb-4">
                            <p class="text-orange-100 text-sm font-bold uppercase tracking-widest">必要巻き数 (発注)</p>
                            <div class="bg-orange-600/30 px-3 py-1 rounded-full">
                                <span id="rollDetail" class="text-orange-100 text-[10px] font-bold">1巻 2250m基準</span>
                            </div>
                        </div>
                        <div class="flex items-baseline text-white justify-center py-4">
                            <span id="rollCount" class="text-8xl font-black font-numeric leading-none">0</span>
                            <span class="ml-3 text-3xl font-black opacity-80">巻</span>
                        </div>
                    </div>

                    <div class="p-6 bg-gray-50 border-t border-gray-100">
                        <p id="formulaText" class="text-[11px] text-gray-400 font-bold mb-1">計算式: √(天地² + 左右²) + 65mm</p>
                        <p id="updateTime" class="text-[10px] text-gray-300 font-medium"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ribbonData = {
            "0": { name: "No.0 (別注)", len: 2250, alert: false },
            "1": { name: "No.1", len: 2250, alert: false }, "2": { name: "No.2", len: 2250, alert: false },
            "3": { name: "No.3", len: 2250, alert: true },  "4": { name: "No.4", len: 2250, alert: false },
            "5": { name: "No.5", len: 2250, alert: false }, "6": { name: "No.6", len: 2250, alert: false },
            "7": { name: "No.7", len: 2250, alert: false }, "8": { name: "No.8", len: 2250, alert: false },
            "9": { name: "No.9", len: 2250, alert: false }, "10": { name: "No.10", len: 2250, alert: false },
            "11": { name: "No.11", len: 2250, alert: true }, "12": { name: "No.12", len: 2250, alert: false },
            "13": { name: "No.13", len: 2250, alert: false }, "14": { name: "No.14", len: 2250, alert: true },
            "15": { name: "No.15", len: 2250, alert: false }, "16": { name: "No.16", len: 2250, alert: false },
            "17": { name: "No.17", len: 2250, alert: false }, "18": { name: "No.18", len: 2250, alert: true },
            "19": { name: "No.19", len: 2250, alert: false }, "20": { name: "No.20", len: 2250, alert: false },
            "21": { name: "No.21", len: 2250, alert: false }, "22": { name: "No.22", len: 2250, alert: false },
            "23": { name: "No.23", len: 2250, alert: false }, "24": { name: "No.24", len: 2250, alert: false },
            "25": { name: "No.25", len: 2250, alert: false },
            "26": { name: "No.26", len: 1500, alert: false }, "27": { name: "No.27", len: 1500, alert: false },
            "28": { name: "No.28", len: 1500, alert: false }, "29": { name: "No.29", len: 1500, alert: false },
            "30": { name: "No.30", len: 1500, alert: false }, "31": { name: "No.31", len: 1500, alert: false },
            "32": { name: "No.32", len: 1500, alert: false }, "33": { name: "No.33", len: 1500, alert: false },
            "34": { name: "No.34", len: 1500, alert: false }, "35": { name: "No.35", len: 1500, alert: true },
            "36": { name: "No.36", len: 1500, alert: false }, "37": { name: "No.37", len: 1500, alert: false },
            "38": { name: "No.38", len: 1200, alert: false }, "39": { name: "No.39", len: 1200, alert: false },
            "40": { name: "No.40", len: 1200, alert: false }, "41": { name: "No.41", len: 1200, alert: false },
            "42": { name: "No.42", len: 1200, alert: false }, "43": { name: "No.43", len: 1200, alert: false },
            "44": { name: "No.44", len: 1200, alert: false }, "45": { name: "No.45", len: 1200, alert: false },
            "46": { name: "No.46", len: 1200, alert: false }, "47": { name: "No.47", len: 1200, alert: false },
            "48": { name: "No.48", len: 1200, alert: false }, "49": { name: "No.49", len: 1200, alert: false },
            "50": { name: "No.50", len: 1200, alert: false }, "51": { name: "No.51", len: 1200, alert: false }
        };

        function initRibbons() {
            const select = document.getElementById('ribbonNo');
            Object.keys(ribbonData).forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.text = `${ribbonData[id].name} (${ribbonData[id].len}m)`;
                select.add(opt);
            });
        }

        function calculate() {
            const h = parseFloat(document.getElementById('h').value) || 0;
            const w = parseFloat(document.getElementById('w').value) || 0;
            const qty = parseFloat(document.getElementById('qty').value) || 0;
            const ribId = document.getElementById('ribbonNo').value;
            const ribbon = ribbonData[ribId];
            
            const isSpecialMode = document.getElementById('fixedToggle').checked;
            const wContainer = document.getElementById('widthContainer');
            
            let singleLen = 0;
            if (isSpecialMode) {
                document.getElementById('fixedLabel').innerText = "万人幸福の栞 (60mm)";
                document.getElementById('formulaText').innerText = `計算式: 天地(${h}mm) + 60mm`;
                wContainer.style.opacity = "0.3";
                wContainer.style.pointerEvents = "none";
                singleLen = Math.ceil(h + 60);
            } else {
                document.getElementById('fixedLabel').innerText = "通常 (65mm)";
                document.getElementById('formulaText').innerText = `計算式: √(天地² + 左右²) + 65mm`;
                wContainer.style.opacity = "1";
                wContainer.style.pointerEvents = "auto";
                const diag = Math.sqrt(Math.pow(h, 2) + Math.pow(w, 2));
                singleLen = Math.ceil(diag + 65);
            }

            if (h <= 0 || (w <= 0 && !isSpecialMode)) return;

            document.getElementById('singleResult').innerText = singleLen.toLocaleString();

            const totalM = (singleLen * qty) / 1000;
            document.getElementById('totalMeters').innerText = totalM.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});

            let rollLen = ribbon.len;
            if (ribId === "0") {
                document.getElementById('customRollArea').classList.remove('hidden');
                rollLen = parseFloat(document.getElementById('customRollLen').value) || 1;
            } else {
                document.getElementById('customRollArea').classList.add('hidden');
            }

            const rollsNeeded = Math.ceil(totalM / rollLen);
            document.getElementById('rollCount').innerText = rollsNeeded.toLocaleString();
            document.getElementById('rollDetail').innerText = `1巻 ${rollLen}m基準`;

            const alertBox = document.getElementById('statusAlert');
            ribbon.alert ? alertBox.classList.remove('hidden') : alertBox.classList.add('hidden');
            
            document.getElementById('updateTime').innerText = "最終計算: " + new Date().toLocaleTimeString();
        }

        function copyToClipboard() {
            const isSpecialMode = document.getElementById('fixedToggle').checked;
            const modeName = isSpecialMode ? "万人幸福の栞" : "通常";
            const no = document.getElementById('ribbonNo').options[document.getElementById('ribbonNo').selectedIndex].text;
            
            const text = `【リボン計算結果】\nモード: ${modeName}\nサイズ: ${document.getElementById('h').value}x${document.getElementById('w').value}mm\n部数: ${document.getElementById('qty').value}部\n使用リボン: ${no}\n1冊長: ${document.getElementById('singleResult').innerText}mm\n総必要長: ${document.getElementById('totalMeters').innerText}m\n必要巻数: ${document.getElementById('rollCount').innerText}巻`;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = "✅ コピーしました";
            btn.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-50', 'text-green-600', 'border-green-200');
            }, 2000);
        }

        const inputs = ['h', 'w', 'qty', 'ribbonNo', 'customRollLen'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        
        window.onload = function() {
            initRibbons();
            calculate();
        };
    </script>
</body>
</html>
